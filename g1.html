<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧙‍♂️ Math Wizards Academy</title>
<style>
/* ============================================================
   GLOBAL RESET & VARIABLES
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFF8EC;
  --card:#FFFFFF;
  --orange:#FFB347;
  --orange-d:#E8972A;
  --blue:#6C91D9;
  --blue-d:#4A70C0;
  --green:#A8E6CF;
  --green-d:#6BBF99;
  --pink:#FFB3BA;
  --purple:#C3A8E6;
  --yellow:#FFE566;
  --red:#FF6B6B;
  --text:#3D2B1F;
  --text-light:#7A5C47;
  --shadow:0 6px 20px rgba(0,0,0,0.12);
  --shadow-sm:0 3px 10px rgba(0,0,0,0.10);
  --radius:20px;
  --radius-sm:12px;
}
html,body{width:100%;min-height:100vh;overflow-x:hidden}
body{
  font-family:'Segoe UI Rounded','Comic Sans MS',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:18px;
  line-height:1.4;
}

/* ============================================================
UTILITY
============================================================ */
.hidden{display:none!important}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.justify-center{justify-content:center}
.gap-2{gap:8px}
.gap-3{gap:12px}
.gap-4{gap:16px}
.text-center{text-align:center}
.bold{font-weight:700}
.w-full{width:100%}

/* ============================================================
HEADER
============================================================ */
#app-header{
background:linear-gradient(135deg,#6C91D9,#A8E6CF);
padding:14px 20px;
display:flex;align-items:center;gap:12px;
position:sticky;top:0;z-index:100;
box-shadow:var(–shadow);
}
#app-header .mascot{font-size:38px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#app-header h1{font-size:24px;font-weight:900;color:#fff;text-shadow:1px 2px 0 rgba(0,0,0,0.15);flex:1}
#star-count{background:var(–yellow);color:var(–text);font-weight:900;font-size:20px;
padding:6px 14px;border-radius:50px;box-shadow:var(–shadow-sm)}
#back-btn{background:rgba(255,255,255,0.3);border:2px solid rgba(255,255,255,0.6);
color:#fff;font-size:18px;font-weight:900;padding:8px 16px;border-radius:50px;
cursor:pointer;display:none}
#back-btn.visible{display:block}

/* ============================================================
MAIN MENU
============================================================ */
#main-menu{padding:20px 16px 40px}
.menu-heading{font-size:20px;font-weight:900;color:var(–blue-d);
margin:20px 0 10px;padding-left:4px;letter-spacing:.5px}
.menu-heading::before{content:‘▸ ‘;color:var(–orange)}
.topic-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:14px;margin-bottom:10px;
}
.topic-btn{
background:var(–card);border:none;border-radius:var(–radius);
padding:18px 10px;cursor:pointer;
box-shadow:var(–shadow-sm);
display:flex;flex-direction:column;align-items:center;gap:8px;
transition:transform .15s,box-shadow .15s;
min-height:110px;border:3px solid transparent;
position:relative;overflow:hidden;
}
.topic-btn:active{transform:scale(0.94)}
.topic-btn::after{content:’’;position:absolute;inset:0;
background:rgba(255,255,255,0);transition:background .15s}
.topic-btn .icon{font-size:40px}
.topic-btn .label{font-size:13px;font-weight:800;color:var(–text);text-align:center;line-height:1.2}
.topic-btn.cat-numbers{border-color:var(–orange);background:linear-gradient(135deg,#fff 50%,#FFF4E3)}
.topic-btn.cat-logic{border-color:var(–blue);background:linear-gradient(135deg,#fff 50%,#EDF2FF)}
.topic-btn.cat-geometry{border-color:var(–green-d);background:linear-gradient(135deg,#fff 50%,#E8FAF4)}
.topic-btn.cat-challenge{border-color:var(–purple);background:linear-gradient(135deg,#fff 50%,#F4EEFF)}

/* ============================================================
EXERCISE PANEL
============================================================ */
#exercise-panel{display:none;padding:16px;max-width:700px;margin:0 auto}
#exercise-panel.visible{display:block}
.ex-card{
background:var(–card);border-radius:var(–radius);
padding:24px 20px;box-shadow:var(–shadow);margin-bottom:16px;
}
.ex-title{font-size:22px;font-weight:900;color:var(–blue-d);text-align:center;margin-bottom:16px}
.question-text{font-size:28px;font-weight:900;text-align:center;margin:10px 0 18px;line-height:1.3}
.sub-text{font-size:18px;color:var(–text-light);text-align:center;margin-bottom:12px}
.emoji-visual{font-size:36px;text-align:center;margin:10px 0;word-break:break-word;line-height:1.6}

/* ============================================================
NUMPAD
============================================================ */
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
.numpad .nk{
background:linear-gradient(135deg,var(–blue),var(–blue-d));
color:#fff;border:none;border-radius:14px;
font-size:26px;font-weight:900;font-family:inherit;
padding:14px 0;cursor:pointer;
box-shadow:0 4px 0 var(–blue-d);
transition:transform .1s,box-shadow .1s;
min-height:60px;
}
.numpad .nk:active{transform:translateY(3px);box-shadow:0 1px 0 var(–blue-d)}
.nk.del{background:linear-gradient(135deg,var(–red),#cc4444);box-shadow:0 4px 0 #aa2222}
.nk.ok{background:linear-gradient(135deg,var(–green-d),#4a9a74);box-shadow:0 4px 0 #2a7a54;font-size:20px}
.nk.neg{background:linear-gradient(135deg,#9966cc,#6633aa);box-shadow:0 4px 0 #442288}
.answer-display{
background:#F5F0E8;border:3px solid var(–blue);border-radius:14px;
font-size:36px;font-weight:900;text-align:center;
padding:12px;min-height:64px;margin-bottom:10px;letter-spacing:4px;
}

/* ============================================================
CHOICE BUTTONS (multiple choice)
============================================================ */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.choice-btn{
background:linear-gradient(135deg,#F0EBFF,#E4D8FF);
border:3px solid var(–purple);border-radius:16px;
font-size:22px;font-weight:900;font-family:inherit;
padding:16px 10px;cursor:pointer;
transition:transform .12s;min-height:60px;
}
.choice-btn:active{transform:scale(0.94)}
.choice-btn.correct{background:linear-gradient(135deg,#D1FAE5,#A7F3D0);border-color:var(–green-d);color:#166534}
.choice-btn.wrong{background:linear-gradient(135deg,#FEE2E2,#FECACA);border-color:var(–red);color:#991B1B}

/* ============================================================
FEEDBACK
============================================================ */
#feedback-bar{
border-radius:var(–radius-sm);padding:14px 18px;
font-size:22px;font-weight:900;text-align:center;
margin:10px 0;display:none;animation:popIn .3s ease-out;
}
#feedback-bar.show{display:block}
#feedback-bar.correct{background:#D1FAE5;color:#166534;border:2px solid var(–green-d)}
#feedback-bar.wrong{background:#FEE2E2;color:#991B1B;border:2px solid var(–red)}
@keyframes popIn{0%{transform:scale(0.85);opacity:0}100%{transform:scale(1);opacity:1}}
.hint-box{
background:#FFFBEB;border:2px dashed var(–orange);
border-radius:var(–radius-sm);padding:12px;
font-size:16px;color:#854D0E;margin-top:10px;display:none;
}
.hint-box.show{display:block}

/* ============================================================
ACTION BUTTONS
============================================================ */
.action-row{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.act-btn{
flex:1;border:none;border-radius:50px;
font-size:18px;font-weight:900;font-family:inherit;
padding:15px 10px;cursor:pointer;
transition:transform .12s;min-height:60px;
}
.act-btn:active{transform:scale(0.96)}
.btn-orange{background:linear-gradient(135deg,var(–orange),var(–orange-d));color:#fff;box-shadow:0 4px 0 var(–orange-d)}
.btn-blue{background:linear-gradient(135deg,var(–blue),var(–blue-d));color:#fff;box-shadow:0 4px 0 var(–blue-d)}
.btn-green{background:linear-gradient(135deg,var(–green-d),#4a9a74);color:#fff;box-shadow:0 4px 0 #2a7a54}

/* ============================================================
STAR PARTICLES
============================================================ */
#star-layer{position:fixed;inset:0;pointer-events:none;z-index:9999}
.sparkle{position:absolute;font-size:28px;animation:sparkleAnim 1.1s ease-out forwards}
@keyframes sparkleAnim{
0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}
100%{transform:translate(var(–tx),var(–ty)) scale(1.4) rotate(360deg);opacity:0}
}

/* ============================================================
TIMER BAR
============================================================ */
.timer-wrap{margin-bottom:12px;display:none}
.timer-wrap.show{display:block}
.timer-label{font-size:18px;font-weight:900;color:var(–blue-d);text-align:center;margin-bottom:6px}
.timer-bg{background:#E5E7EB;border-radius:50px;height:20px;overflow:hidden}
.timer-fill{height:100%;border-radius:50px;
background:linear-gradient(90deg,#22C55E,#FACC15,#EF4444);
transition:width .1s linear}

/* ============================================================
PROGRESS BAR
============================================================ */
.progress-wrap{margin-bottom:14px}
.progress-bg{background:#E5E7EB;border-radius:50px;height:14px;overflow:hidden}
.progress-fill{height:100%;border-radius:50px;
background:linear-gradient(90deg,var(–purple),var(–blue));transition:width .4s}
.progress-label{font-size:16px;font-weight:800;color:var(–text-light);
text-align:right;margin-top:4px}

/* ============================================================
TEN FRAME
============================================================ */
.ten-frame{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
max-width:300px;margin:12px auto;background:#F9FAFB;
border:3px solid var(–blue);border-radius:12px;padding:8px}
.tf-cell{
width:48px;height:48px;border-radius:8px;
display:flex;align-items:center;justify-content:center;
font-size:28px;border:2px solid #D1D5DB;background:#fff;
}
.tf-cell.filled{background:#FEF9C3;border-color:var(–orange)}

/* ============================================================
NUMBER LINE
============================================================ */
.number-line-wrap{overflow-x:auto;padding:10px 0 30px;margin:10px 0}
.number-line{display:flex;align-items:center}
.nl-num{min-width:40px;text-align:center;font-size:16px;font-weight:800;position:relative;user-select:none}
.nl-num.neg{color:var(–red)}
.nl-num.zero{color:var(–blue-d);font-size:18px}
.nl-num.marker::after{content:‘▲’;position:absolute;bottom:-22px;left:50%;
transform:translateX(-50%);color:var(–orange);font-size:14px}
.nl-tick{height:14px;width:2px;background:#9CA3AF;margin:0 auto 2px}
.nl-line{flex:1;height:3px;background:#9CA3AF}

/* ============================================================
GRIDS (magic square, venn, cartesian)
============================================================ */
.ms-grid{display:grid;grid-template-columns:repeat(3,1fr);
gap:8px;max-width:280px;margin:16px auto}
.ms-cell{
height:70px;border-radius:12px;border:3px solid var(–blue);
display:flex;align-items:center;justify-content:center;
font-size:28px;font-weight:900;background:#F0F4FF;
cursor:pointer;transition:background .15s;
}
.ms-cell.empty{background:#FFF8EC;border-style:dashed;cursor:default}
.ms-cell.correct{background:#D1FAE5;border-color:var(–green-d)}

/* VENN */
.venn-wrap{position:relative;height:220px;margin:10px auto;max-width:340px}
.venn-circle{
position:absolute;width:180px;height:180px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:16px;font-weight:900;opacity:.7;top:20px;
}
.vc-left{background:#FFB3BA;left:0}
.vc-right{background:#A8E6CF;right:0}
.venn-overlap{position:absolute;width:80px;height:180px;
left:50%;top:20px;transform:translateX(-50%);
background:#C3A8E6;opacity:.7;border-radius:50%;}
.venn-labels{position:absolute;width:100%;top:90px;display:flex;justify-content:space-between;padding:0 10px}
.venn-label{font-size:22px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.venn-center-num{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
font-size:24px;font-weight:900;color:#4C1D95}

/* CARTESIAN */
.cart-table{border-collapse:collapse;margin:12px auto}
.cart-cell{width:48px;height:48px;border:1px solid #CBD5E1;
text-align:center;font-size:20px;cursor:pointer;
background:#F0F9FF;transition:background .15s;position:relative}
.cart-cell:hover{background:#E0F2FE}
.cart-cell.plotted{background:#FEF9C3}
.cart-cell.correct{background:#D1FAE5}
.cart-axis{width:28px;height:28px;font-size:13px;font-weight:800;
color:#6B7280;text-align:center;vertical-align:middle}

/* ============================================================
FRACTION VISUAL
============================================================ */
.fraction-pie{display:inline-block;margin:8px}
.frac-display{font-size:36px;font-weight:900;text-align:center;
display:flex;align-items:center;justify-content:center;gap:6px}
.frac-display .frac{display:inline-flex;flex-direction:column;align-items:center}
.frac-display .frac hr{width:100%;border:2px solid var(–text);margin:2px 0}

/* ============================================================
COIN STYLES
============================================================ */
.coin{display:inline-flex;align-items:center;justify-content:center;
border-radius:50%;font-size:12px;font-weight:900;
margin:4px;border:3px solid;cursor:default;user-select:none;}
.coin.penny{width:44px;height:44px;background:#CD7F32;border-color:#8B4513;color:#fff}
.coin.nickel{width:44px;height:44px;background:#C0C0C0;border-color:#808080;color:#333}
.coin.dime{width:38px;height:38px;background:#B8860B;border-color:#8B6914;color:#fff;font-size:10px}
.coin.quarter{width:52px;height:52px;background:#C0C0C0;border-color:#708090;color:#333}

/* ============================================================
CLOCK
============================================================ */
.clock-svg{display:block;margin:10px auto}

/* ============================================================
SCORE SCREEN
============================================================ */
.score-screen{text-align:center;padding:20px}
.score-big{font-size:72px;font-weight:900;color:var(–purple);font-family:inherit}
.star-row-big{font-size:48px;letter-spacing:6px;margin:10px 0}
.score-msg{font-size:22px;font-weight:800;color:var(–text-light);margin:10px 0}

/* WIZARD BANNER */
.wizard-banner{
background:linear-gradient(135deg,#4C1D95,#7C3AED);
color:#fff;border-radius:var(–radius);padding:18px;
text-align:center;margin-bottom:14px;
}
.wizard-banner .wi{font-size:56px}
.wiz-dots{display:flex;justify-content:center;gap:14px;margin-top:10px}
.wdot{width:30px;height:30px;border-radius:50%;
background:rgba(255,255,255,.3);border:3px solid rgba(255,255,255,.6)}
.wdot.done{background:var(–yellow);border-color:var(–yellow)}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:12px;
height:180px;padding:10px;justify-content:center;
border-bottom:3px solid var(–text);border-left:3px solid var(–text);
margin:16px auto;max-width:400px;position:relative}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-bar{width:100%;border-radius:6px 6px 0 0;min-width:36px;
display:flex;align-items:flex-end;justify-content:center;
font-size:14px;font-weight:900;color:#fff;padding-bottom:4px}
.bar-label{font-size:13px;font-weight:800;color:var(–text-light)}

/* PATH GRID */
.path-grid{display:grid;gap:4px;margin:14px auto;width:fit-content}
.path-cell{
width:52px;height:52px;border-radius:10px;
display:flex;align-items:center;justify-content:center;
font-size:22px;cursor:pointer;border:2px solid #D1D5DB;
background:#fff;transition:background .15s;
}
.path-cell.start{background:#D1FAE5;border-color:var(–green-d)}
.path-cell.end{background:#FEE2E2;border-color:var(–red)}
.path-cell.blocked{background:#F3F4F6;cursor:not-allowed}
.path-cell.selected{background:#FEF9C3;border-color:var(–orange)}
.path-cell.correct-path{background:#A7F3D0;border-color:var(–green-d)}

/* ARRAY VISUAL */
.array-vis{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:14px 0}
.array-group{display:flex;flex-wrap:wrap;gap:3px;
background:#F3F0FF;border:2px dashed var(–purple);
border-radius:10px;padding:6px;max-width:180px}

/* MATHEMATICIAN CARD */
.math-card{
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;border-radius:var(–radius);padding:20px;
text-align:center;margin-bottom:14px;
}
.math-card .portrait{font-size:72px;margin:8px 0}
.math-card h3{font-size:22px;font-weight:900;margin:8px 0 4px}
.math-card .years{font-size:15px;opacity:.8;margin-bottom:12px}
.math-card .fact{font-size:16px;background:rgba(255,255,255,.2);
border-radius:12px;padding:10px;line-height:1.5}

/* CERTIFICATE */
.certificate{
background:linear-gradient(135deg,#FFF8DC,#FFFACD);
border:6px double var(–orange);border-radius:var(–radius);
padding:30px;text-align:center;margin-top:16px;
}
.cert-title{font-size:28px;font-weight:900;color:var(–orange-d);margin-bottom:10px}
.cert-name{font-size:22px;color:var(–blue-d);margin:8px 0}
.cert-stars{font-size:48px;letter-spacing:4px;margin:10px 0}

/* PROBLEM POSTER */
.poster-template{
background:#F0F4FF;border:3px solid var(–blue);
border-radius:var(–radius-sm);padding:20px;text-align:center;
font-size:36px;font-weight:900;margin:16px 0;
display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
}
.poster-slot{
display:inline-block;width:60px;height:60px;
border-bottom:4px solid var(–blue);text-align:center;
font-size:36px;font-weight:900;color:var(–blue-d);
cursor:pointer;
}

/* ALPHAMETRIC */
.alpha-word{display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.alpha-letter{
width:52px;height:52px;border-radius:10px;
border:3px solid var(–purple);background:#F4EEFF;
display:flex;align-items:center;justify-content:center;
font-size:26px;font-weight:900;color:var(–blue-d);
}

/* ============================================================
RESPONSIVE
============================================================ */
@media(max-width:400px){
.topic-grid{grid-template-columns:repeat(2,1fr)}
.topic-btn .icon{font-size:32px}
.numpad .nk{font-size:22px;padding:12px 0;min-height:52px}
.question-text{font-size:24px}
.choices{grid-template-columns:1fr 1fr}
.choice-btn{font-size:18px;padding:13px 8px}
}
@media(min-width:600px){
.topic-grid{grid-template-columns:repeat(3,1fr)}
.numpad{grid-template-columns:repeat(5,1fr)}
}
</style>

</head>
<body>

<!-- ===================== STAR LAYER ===================== -->

<div id="star-layer"></div>

<!-- ===================== HEADER ===================== -->

<header id="app-header">
  <div class="mascot">🧙‍♂️</div>
  <h1>Math Wizards!</h1>
  <div id="star-count">⭐ 0</div>
  <button id="back-btn" onclick="goHome()" aria-label="Back to menu">🏠 Menu</button>
</header>

<!-- ===================== MAIN MENU ===================== -->

<div id="main-menu">
  <div class="menu-heading">🔢 Numbers & Operations</div>
  <div class="topic-grid">
    <button class="topic-btn cat-numbers" onclick="startTopic('grouping')">
      <span class="icon">🔢</span><span class="label">Grouping Tens</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('addition')">
      <span class="icon">➕</span><span class="label">Addition 1×1 & 2×1</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('superspeed')">
      <span class="icon">⚡</span><span class="label">Super Speed Add!</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('intadd')">
      <span class="icon">🌡️</span><span class="label">Integer Addition</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('doublehalf')">
      <span class="icon">✌️</span><span class="label">Double & Half</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('multiply')">
      <span class="icon">✖️</span><span class="label">Multiplication</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('division')">
      <span class="icon">➗</span><span class="label">Division</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('maketen')">
      <span class="icon">🔟</span><span class="label">Making Tens</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('regroup_multi')">
      <span class="icon">🧮</span><span class="label">Regroup Many</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('integers')">
      <span class="icon">📏</span><span class="label">Integers</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('mult_patterns')">
      <span class="icon">🔀</span><span class="label">Multiply Patterns</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('exponents')">
      <span class="icon">🔺</span><span class="label">Exponents</span>
    </button>
    <button class="topic-btn cat-numbers" onclick="startTopic('fractions')">
      <span class="icon">🍕</span><span class="label">Fractions</span>
    </button>
  </div>

  <div class="menu-heading">🧠 Logic & Thinking</div>
  <div class="topic-grid">
    <button class="topic-btn cat-logic" onclick="startTopic('otherone')">
      <span class="icon">🍎</span><span class="label">"Other One" Problems</span>
    </button>
    <button class="topic-btn cat-logic" onclick="startTopic('allbut')">
      <span class="icon">🍪</span><span class="label">"All But" Problems</span>

<script>
/* ============================================================
   GLOBAL STATE
   ============================================================ */
let totalStars = 0;
let currentTopic = null;
let currentAnswer = null;
let answerStr = '';
let timerInterval = null;
let timerLeft = 0;

// 25-equations state
let eq25List=[], eq25Idx=0, eq25Score=0;
// Wee Wizards state
let wizStep=0, wizScore=0;
// Spirit contest
let spiritIdx=0, spiritScore=0;
// Magic square
let msAnswer=null, msMissing=null;
// Poster
let posterA=null, posterB=null, posterTarget=null;
// Mathematician
let mathIdx=0;

/* ============================================================
   UTILITY
   ============================================================ */
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=arr=>arr[rand(0,arr.length-1)];
const $=id=>document.getElementById(id);
const EMS=['⭐','🌟','🎉','✨','💫','🎊','🏆','🌈','🦄','🎈'];

function addStars(n){
  totalStars+=n;
  $('star-count').textContent='⭐ '+totalStars;
  shootStars();
}
function shootStars(){
  const layer=$('star-layer');
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const s=document.createElement('div');
      s.className='sparkle';
      s.textContent=pick(EMS);
      const x=rand(10,window.innerWidth-60);
      const y=rand(80,window.innerHeight-100);
      const tx=rand(-200,200);
      const ty=rand(-300,-60);
      s.style.cssText=`left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px`;
      layer.appendChild(s);
      setTimeout(()=>s.remove(),1200);
    },i*60);
  }
}

function showFeedback(ok,msg,hint=''){
  const fb=$('feedback-bar');
  fb.textContent=(ok?'✅ ':'❌ ')+msg;
  fb.className='feedback-bar show '+(ok?'correct':'wrong');
  const hb=$('hint-box');
  if(!ok&&hint){hb.textContent='💡 '+hint;hb.className='hint-box show';}
  else hb.className='hint-box';
  if(ok)addStars(1);
}
function clearFeedback(){
  $('feedback-bar').className='feedback-bar';
  $('hint-box').className='hint-box';
}

/* NUMPAD */
function buildNumpad(negBtn=false){
  const rows=[
    [1,2,3,4,5],
    [6,7,8,9,0]
  ];
  const negHTML=negBtn?`<button class="nk neg" onclick="npPress('-')" aria-label="negative">±</button>`:'';
  return `
  <div class="answer-display" id="ans-disp">_</div>
  <div class="numpad">
    ${rows.flat().map(n=>`<button class="nk" onclick="npPress('${n}')" aria-label="${n}">${n}</button>`).join('')}
    ${negHTML}
    <button class="nk del" onclick="npPress('del')" aria-label="delete">⌫</button>
    <button class="nk ok" onclick="npSubmit()" aria-label="check answer">✔ OK</button>
  </div>`;
}
function npPress(v){
  if(v==='del'){answerStr=answerStr.slice(0,-1);}
  else if(v==='-'){if(!answerStr)answerStr='-';}
  else{if(answerStr.length<5)answerStr+=v;}
  const d=$('ans-disp');
  if(d)d.textContent=answerStr||'_';
}
function npSubmit(){
  const val=parseInt(answerStr,10);
  if(isNaN(val)){showFeedback(false,'Enter a number first!');return;}
  checkNumericAnswer(val);
}
function checkNumericAnswer(val){
  const ok=val===currentAnswer;
  showFeedback(ok,
    ok?pick(['Amazing!','Brilliant!','You rock!','Perfect! 🎊','Magical!']):`The answer is ${currentAnswer}. Try the next one!`,
    ok?'':`The answer was ${currentAnswer}`);
  answerStr='';
  const d=$('ans-disp');if(d)d.textContent='_';
}

/* CHOICE BUTTONS */
function makeChoices(opts,correct,onPick){
  return `<div class="choices">${opts.map((o,i)=>`
    <button class="choice-btn" onclick="choicePick(${i},${correct},this)">${o}</button>
  `).join('')}</div>`;
}
function choicePick(idx,correct,btn){
  const ok=idx===correct;
  showFeedback(ok,ok?pick(['Great!','Correct!','You got it!','Awesome!']):'Not quite! Try again!');
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    if(i===correct)b.classList.add('correct');
    else if(i===idx&&!ok)b.classList.add('wrong');
  });
}

/* ============================================================
   HOME / NAV
   ============================================================ */
function goHome(){
  clearInterval(timerInterval);
  currentTopic=null;
  $('main-menu').classList.remove('hidden');
  $('exercise-panel').classList.add('hidden');
  $('exercise-panel').className='hidden';
  $('back-btn').className='';
  clearFeedback();
}
function startTopic(id){
  currentTopic=id;
  answerStr='';
  $('main-menu').classList.add('hidden');
  $('exercise-panel').className='visible';
  $('back-btn').className='visible';
  clearFeedback();
  render(id);
}
function render(id){
  clearInterval(timerInterval);
  clearFeedback();
  answerStr='';
  $('timer-wrap').className='timer-wrap';
  const map={
    grouping:renderGrouping, addition:renderAddition,
    superspeed:renderSuperSpeed, intadd:renderIntAdd,
    doublehalf:renderDoubleHalf, multiply:renderMultiply,
    division:renderDivision, maketen:renderMakeTen,
    regroup_multi:renderRegroupMulti, integers:renderIntegers,
    mult_patterns:renderMultPatterns, exponents:renderExponents,
    fractions:renderFractions,
    otherone:renderOtherOne, allbut:renderAllBut,
    cuts:renderCuts, date:renderDate,
    magic_sq:renderMagicSq, venn:renderVenn,
    pathways:renderPathways, alphametric:renderAlphametric,
    logic:renderLogic,
    shapes_count:renderShapesCount, polygons:renderPolygons,
    time:renderTime, money:renderMoney,
    cartesian:renderCartesian, data:renderData,
    spirit:renderSpirit, twenty5:renderTwenty5,
    wee_wizards:renderWeeWizards, poster:renderPoster,
    mathematicians:renderMathematicians,
  };
  if(map[id])map[id]();
}

function setTitle(t){$('ex-title').textContent=t}
function setBody(h){$('ex-body').innerHTML=h}
function newBtn(id){return`<div class="action-row"><button class="act-btn btn-orange" onclick="render('${id}')">🔄 New Problem</button></div>`}
function checkBtn(){return`<div class="action-row"><button class="act-btn btn-green" onclick="npSubmit()">✅ Check Answer</button></div>`}

/* ============================================================
   1. GROUPING TENS (up to 100)
   ============================================================ */
function renderGrouping(){
  setTitle('🔢 Grouping Tens');
  const total=rand(11,99);
  const tens=Math.floor(total/10);
  const ones=total%10;
  const emoji=pick(['⭐','🍎','🍭','🔵','🌸','🐾','🦋']);
  currentAnswer=ones;
  // Show groups
  let groups='';
  for(let t=0;t<tens;t++){
    groups+=`<span style="background:#E9D5FF;border-radius:8px;padding:3px 5px;margin:3px;display:inline-block">${emoji.repeat(10)}</span>`;
  }
  if(ones>0)groups+=`<span style="background:#FEF9C3;border-radius:8px;padding:3px 5px;margin:3px;display:inline-block">${emoji.repeat(ones)}</span>`;
  setBody(`
    <div class="sub-text">Total: <b>${total}</b> objects</div>
    <div class="emoji-visual" style="font-size:22px">${groups}</div>
    <div class="question-text">${tens} ten${tens!==1?'s':''} and how many <b>ones</b>?</div>
    <div style="font-size:14px;color:var(--text-light);text-align:center;margin-bottom:8px">
      Purple = tens groups | Yellow = leftover ones
    </div>
    ${buildNumpad()}
    ${newBtn('grouping')}
  `);
}

/* ============================================================
   2. ADDITION (1×1 and 2×1)
   ============================================================ */
function renderAddition(){
  setTitle('➕ Addition');
  const mode=pick(['1x1','2x1_no','2x1_reg']);
  let a,b,hint;
  if(mode==='1x1'){a=rand(1,9);b=rand(1,9-a);hint='Count all the emojis!';}
  else if(mode==='2x1_no'){a=rand(10,89);b=rand(1,9-a%10);hint='Add the ones first, then the tens.';}
  else{a=rand(11,89);b=rand(2,9);hint='The ones add up past 9 – carry the ten!';}
  currentAnswer=a+b;
  const emoji=pick(['⭐','🍎','🔵','🌸']);
  const vis=a<=20?`<div class="emoji-visual">${emoji.repeat(a)} + ${emoji.repeat(b)}</div>`:'';
  setBody(`
    <div class="question-text">${a} + ${b} = ?</div>
    ${vis}
    ${buildNumpad()}
    <div class="action-row">
      <button class="act-btn btn-blue" onclick="showHint('${hint}')">💡 Hint</button>
      <button class="act-btn btn-orange" onclick="render('addition')">🔄 New</button>
    </div>
  `);
}
function showHint(msg){
  $('hint-box').textContent='💡 '+msg;
  $('hint-box').className='hint-box show';
}

/* ============================================================
   3. SUPER SPEED ADDITION
   ============================================================ */
function renderSuperSpeed(){
  setTitle('⚡ Super Speed Addition!');
  $('timer-wrap').className='timer-wrap show';
  clearFeedback();
  // Countdown first
  let cd=3;
  setBody(`<div class="question-text" id="ss-countdown" style="font-size:80px;color:var(--orange)">3</div><div class="sub-text">Get ready!</div>`);
  const cdInt=setInterval(()=>{
    cd--;
    const el=$('ss-countdown');
    if(!el){clearInterval(cdInt);return;}
    if(cd>0)el.textContent=cd;
    else if(cd===0){el.textContent='GO! 🚀';el.style.color='var(--green-d)';}
    else{
      clearInterval(cdInt);
      const a=rand(1,9),b=rand(1,9);
      currentAnswer=a+b;
      setBody(`
        <div class="question-text" style="font-size:64px">${a} + ${b} = ?</div>
        ${buildNumpad()}
      `);
      startSSTimer();
    }
  },700);
}
function startSSTimer(){
  timerLeft=3000;
  $('timer-fill').style.width='100%';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerLeft-=100;
    const pct=Math.max(0,timerLeft/3000*100);
    const tf=$('timer-fill');if(tf)tf.style.width=pct+'%';
    if(timerLeft<=0){
      clearInterval(timerInterval);
      showFeedback(false,`Too slow! Answer was ${currentAnswer}. 😅`);
      setTimeout(()=>render('superspeed'),1500);
    }
  },100);
}
// Override npSubmit for superspeed
const _origNpSubmit=window.npSubmit;
window.npSubmit=function(){
  if(currentTopic==='superspeed'){
    clearInterval(timerInterval);
    const val=parseInt(answerStr,10);
    if(isNaN(val)){showFeedback(false,'Enter a number!');return;}
    const ok=val===currentAnswer;
    showFeedback(ok,ok?'🚀 Lightning fast! Correct!':'Oops! The answer was '+currentAnswer);
    answerStr='';const d=$('ans-disp');if(d)d.textContent='_';
    if(ok){addStars(2);}
    setTimeout(()=>render('superspeed'),1500);
  } else if(currentTopic==='twenty5'){eq25Check();
  } else if(currentTopic==='wee_wizards'){wizCheck();
  } else{checkNumericAnswer(parseInt(answerStr,10));}
};

/* ============================================================
   4. INTEGER ADDITION (number line –10 to 10)
   ============================================================ */
function renderIntAdd(){
  setTitle('🌡️ Integer Addition');
  const a=rand(-5,5), b=rand(-5,5);
  currentAnswer=a+b;
  const nlNums=Array.from({length:21},(_,i)=>i-10);
  const nlHTML=`<div class="number-line-wrap"><div class="number-line">
    ${nlNums.map(n=>`<div class="nl-num${n<0?' neg':''}${n===0?' zero':''}${n===a?' marker':''}" title="${n}">
      <div class="nl-tick"></div>${n}</div>${n<10?'<div class="nl-line"></div>':''}
    `).join('')}
  </div><div style="text-align:center;font-size:13px;color:var(--text-light);margin-top:24px">▲ = start (${a})</div></div>`;
  setBody(`
    <div class="question-text">${a} + (${b}) = ?</div>
    <div class="sub-text">${b<0?`Move ${Math.abs(b)} steps ⬅️ left`:`Move ${b} steps ➡️ right`} on the number line</div>
    ${nlHTML}
    ${buildNumpad(true)}
    ${newBtn('intadd')}
  `);
}

/* ============================================================
   5. DOUBLE & HALF
   ============================================================ */
function renderDoubleHalf(){
  setTitle('✌️ Double & Half');
  const mode=pick(['double','half']);
  if(mode==='double'){
    const n=rand(1,20);
    currentAnswer=n*2;
    const emoji=pick(['🍎','⭐','🔵','🐾']);
    const vis=n<=10?`<div class="emoji-visual">${emoji.repeat(n)} | ${emoji.repeat(n)}</div>`:'';
    setBody(`
      <div class="sub-text">Double means 2 equal groups!</div>
      ${vis}
      <div class="question-text">Double of <b>${n}</b> = ?</div>
      ${buildNumpad()}
      ${newBtn('doublehalf')}
    `);
  } else {
    const n=rand(1,10)*2;
    currentAnswer=n/2;
    const emoji=pick(['🍕','🎈','🍭']);
    setBody(`
      <div class="sub-text">Half means split into 2 equal groups!</div>
      <div class="emoji-visual">${emoji.repeat(n)}</div>
      <div class="question-text">Half of <b>${n}</b> = ?</div>
      ${buildNumpad()}
      ${newBtn('doublehalf')}
    `);
  }
}

/* ============================================================
   6. MULTIPLICATION
   ============================================================ */
function renderMultiply(){
  setTitle('✖️ Multiplication');
  const factors=[2,3,4,5,10];

  currentAnswer=a*b;
  const emoji=pick(['⭐','🔵','🌸','🍎']);
  const groups=Array.from({length:b},(_,i)=>`<div class="array-group">${emoji.repeat(a)}</div>`).join('');

    <div class="question-text">${a} × ${b} = ?</div>
    <div class="sub-text">${b} group${b!==1?'s':''} of ${a}:</div>

    ${buildNumpad()}

      <button class="act-btn btn-blue" onclick="showHint('Count by ${a}s: ${Array.from({length:b},(_,i)=>(i+1)*a).join(', ')}')">💡 Hint</button>

   10. CUTS & PIECES
   ============================================================ */
function renderCuts(){
  setTitle('✂️ Cuts & Pieces');
  const problems=[
    ()=>{const p=rand(2,7);const c=p-1;currentAnswer=c;return`Cut a ribbon into <b>${p} pieces</b>. How many <b>cuts</b> do you need? ✂️`;},
    ()=>{const p=rand(3,6);const mins=rand(2,5);currentAnswer=(p-1)*mins;return`A log is cut into <b>${p} pieces</b>. Each cut takes <b>${mins} minutes</b>. Total time? ⏱️`;},
    ()=>{const pages=rand(5,20);const perday=rand(2,4);currentAnswer=Math.ceil(pages/perday);return`A book has <b>${pages} pages</b>. You read <b>${perday} pages</b> a day. How many days to finish? 📚`;},

}

   ============================================================ */
function renderShapesCount(){
  setTitle('🔷 Counting Shapes');
  const shapes=[
    {sym:'🔺',name:'triangle'},
    {sym:'🔵',name:'circle'},
    {sym:'🟦',name:'square'},
    {sym:'🔶',name:'diamond'},
  ];

/* ============================================================
   15. PATHWAYS
   ============================================================ */
function renderPathways(){
  setTitle('🗺️ Pathways – Count the Routes');
  const rows=3, cols=3;
  // Pascal's triangle approach: dp[i][j] = routes from (0,0) to (i,j)
  const dp=Array.from({length:rows},()=>Array(cols).fill(0));
  for(let i=0;i<rows;i++) for(let j=0;j<cols;j++){
    if(i===0||j===0)dp[i][j]=1;
    else dp[i][j]=dp[i-1][j]+dp[i][j-1];
  }
  currentAnswer=dp[rows-1][cols-1];
  // Build grid
  let gridHTML='<table class="path-grid" style="display:block;border-collapse:separate;border-spacing:4px"><tbody>';
  for(let i=0;i<rows;i++){
    gridHTML+='<tr>';
    for(let j=0;j<cols;j++){
      const cls=i===0&&j===0?'path-cell start':i===rows-1&&j===cols-1?'path-cell end':'path-cell';
      const lbl=i===0&&j===0?'🚀':i===rows-1&&j===cols-1?'🏁':'';
      gridHTML+=`<td class="${cls}">${lbl}</td>`;
    }
    gridHTML+='</tr>';
  }
  gridHTML+='</tbody></table>';
  setBody(`
    <div class="sub-text">From 🚀 to 🏁, moving only ➡️ right or ⬇️ down.</div>
    <div class="sub-text">How many different paths are there?</div>
    ${gridHTML}
    ${buildNumpad()}
    <div class="action-row">
      <button class="act-btn btn-blue" onclick="showHint('Try tracing each path with your finger!')">💡 Hint</button>
      <button class="act-btn btn-orange" onclick="render('pathways')">🔄 New</button>
    </div>
  `);
}

/* ============================================================
   28. CARTESIAN COORDINATES
   ============================================================ */
function renderCartesian(){
  setTitle('📍 Cartesian Grid');
  const mode=pick(['plot','read','move']);
  const size=5;
  function buildGrid(markedX,markedY,clickable=false,targetX=-1,targetY=-1){
    let html='<table class="cart-table"><tbody>';
    for(let y=size;y>=0;y--){
      html+='<tr>';
      html+=`<td class="cart-axis">${y>0?y:''}</td>`;
      for(let x=0;x<=size;x++){
        if(y===0){html+=`<td class="cart-axis">${x}</td>`;continue;}
        const isMarked=x===markedX&&y===markedY;
        const isTarget=x===targetX&&y===targetY;
        const cls='cart-cell'+(isMarked?' plotted':'')+(isTarget?' correct':'');
        const clickAttr=clickable?`onclick="cartClick(${x},${y},${targetX},${targetY})"`:'' ;
        html+=`<td class="${cls}" ${clickAttr}>${isMarked?'⭐':''}</td>`;
      }
      html+='</tr>';
    }
    html+='</tbody></table>';
    return html;
  }
  if(mode==='read'){
    const px=rand(1,5),py=rand(1,5);
    const opts=[[px,py],[rand(1,5),rand(1,5)],[rand(1,5),rand(1,5)],[rand(1,5),rand(1,5)]].map(p=>`(${p[0]},${p[1]})`);
    const deduped=[...new Set(opts)];while(deduped.length<4)deduped.push(`(${rand(1,5)},${rand(1,5)})`);
    const correct=deduped.indexOf(`(${px},${py})`);
    setBody(`
      <div class="sub-text">What are the coordinates of ⭐?</div>
      ${buildGrid(px,py)}
      ${makeChoices(deduped,correct,null)}
      ${newBtn('cartesian')}
    `);
  } else if(mode==='plot'){
    const tx=rand(1,5),ty=rand(1,5);
    setBody(`
      <div class="sub-text">Tap to plot the point <b>(${tx}, ${ty})</b>!</div>
      ${buildGrid(-1,-1,true,tx,ty)}
      ${newBtn('cartesian')}
    `);
    currentAnswer=`${tx},${ty}`;
  } else {
    // Move
    const sx=rand(1,3),sy=rand(1,3),dx=rand(1,2),dy=rand(1,2);
    const ex=sx+dx,ey=sy+dy;
    if(ex>5||ey>5){render('cartesian');return;}
    const opts=[[ex,ey],[sx+dy,sy+dx],[ex-1,ey],[ex,ey-1]].map(p=>`(${p[0]},${p[1]})`);
    const deduped=[...new Set(opts)];
    const correct=deduped.indexOf(`(${ex},${ey})`);
    setBody(`
      <div class="sub-text">Start at <b>(${sx},${sy})</b>. Move <b>${dx} right</b> and <b>${dy} up</b>. Where do you end?</div>
      ${buildGrid(sx,sy)}
      ${makeChoices(deduped,correct,null)}
      ${newBtn('cartesian')}
    `);
  }
}
function cartClick(x,y,tx,ty){
  const ok=x===tx&&y===ty;
  showFeedback(ok,ok?`🎉 Yes! (${x},${y}) is correct!`:`That's (${x},${y}). Try (${tx},${ty})!`);
  if(ok)document.querySelectorAll('.cart-cell').forEach(c=>c.onclick=null);
}

function renderTwenty5(){
  setTitle('📝 25 Equations Challenge!');
  eq25Idx=0; eq25Score=0;
  eq25List=generate25Eqs();
  renderEq25Current();
}
function generate25Eqs(){
  const list=[];
  const types=['add','sub','mul2','mul5','mul10','div','int_add','frac_add'];
  for(let i=0;i<25;i++){
    const t=types[i%types.length];
    list.push(genEq(t));
  }
  return list.sort(()=>Math.random()-.5);
}
function genEq(type){
  if(type==='add'){const a=rand(1,20),b=rand(1,20);return{q:`${a} + ${b}`,ans:a+b};}
  if(type==='sub'){const a=rand(5,25),b=rand(1,a);return{q:`${a} − ${b}`,ans:a-b};}
  if(type==='mul2'){const n=rand(1,9);return{q:`2 × ${n}`,ans:2*n};}
  if(type==='mul5'){const n=rand(1,9);return{q:`5 × ${n}`,ans:5*n};}
  if(type==='mul10'){const n=rand(1,9);return{q:`10 × ${n}`,ans:10*n};}
  if(type==='div'){const d=[2,3,4,5];const dv=pick(d),q=rand(1,5);return{q:`${dv*q} ÷ ${dv}`,ans:q};}
  if(type==='int_add'){const a=rand(-5,5),b=rand(-5,5);return{q:`${a} + (${b})`,ans:a+b};}
  if(type==='frac_add'){const d=pick([4,3,8]);const n1=rand(1,d-2),n2=rand(1,d-n1-1);return{q:`${n1}/${d} + ${n2}/${d} = ?/${d} (type top)`,ans:n1+n2};}
  return{q:`5 + 5`,ans:10};
}
